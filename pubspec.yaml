name: studentmanagement
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  equatable: ^2.0.5
  floor: ^1.5.0
  sqflite: ^2.4.2
  fluttertoast: ^8.2.8
  path_provider: ^2.1.5
  dartz: ^0.10.1
